<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Raju Game Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>RAJU GAME STORE</h1>
    <p>Top Up Game Murah & Cepat</p>

    <div class="card">
      <h2>FREE FIRE DIAMOND</h2>
      <ul>
        <li>12 💎 — 1.913</li>
        <li>50 💎 — 6.750</li>
        <li>70 💎 — 9.425</li>
        <li>100 💎 — 15.500</li>
        <li>140 💎 — 18.010</li>
        <li>355 💎 — 46.525</li>
      </ul>
    </div>

  </div>

</body>
</html><form id="orderForm">
  <input type="text" id="customer_no" placeholder="Masukkan ID / No Tujuan" required>

  <select id="buyer_sku_code" required>
    <option value="ff12">12 Diamond</option>
    <option value="ff50">50 Diamond</option>
    <option value="ff70">70 Diamond</option>
    <option value="ff100">100 Diamond</option>
    <option value="ff140">140 Diamond</option>
    <option value="ff355">355 Diamond</option>
  </select>

  <button type="submit" class="btn">BELI SEKARANG</button>
</form>

<pre id="result"></pre>

<script>
document.getElementById("orderForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const customer_no = document.getElementById("customer_no").value;
  const buyer_sku_code = document.getElementById("buyer_sku_code").value;
  const ref_id = "INV-" + Date.now();

  const res = await fetch("/api/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      buyer_sku_code,
      customer_no,
      ref_id
    })
  });

  const data = await res.json();
  document.getElementById("result").textContent = JSON.stringify(data, null, 2);
});
</script>
